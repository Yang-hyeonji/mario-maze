<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Head Tilt Maze</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: url('assets/background.jpeg') center/cover no-repeat fixed;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    overflow: auto;
    padding: 0 12px 24px;
  }

  /* ── 타이틀 이미지 ── */
  .title-wrap {
    margin: 18px 0 10px;
    perspective: 700px;
    perspective-origin: 50% 80%;
  }
  #title-img {
    display: block;
    width: clamp(220px, 52vw, 360px);
    height: auto;
    transform: rotateX(10deg);
    filter: drop-shadow(0 6px 18px rgba(0,0,0,.45))
            drop-shadow(0 2px 4px rgba(0,0,0,.3));
    user-select: none;
    pointer-events: none;
  }

  /* ── 상단 바 ── */
  .top-bar {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 8px; width: 100%; max-width: 480px; justify-content: flex-end;
    flex-wrap: wrap;
  }
  .status-pill {
    background: rgba(255,255,255,0.22);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.35);
    box-shadow: 0 2px 10px rgba(0,0,0,.15);
    border-radius: 20px; padding: 5px 14px; font-size: .78rem; color: #fff;
    display: flex; align-items: center; gap: 6px;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,.5); }
  .dot.active { background: #4caf50; box-shadow: 0 0 6px #4caf50; }
  #timer-display {
    font-weight: 700; color: #fff; font-size: .9rem;
    text-shadow: 0 1px 6px rgba(0,0,0,.55);
  }

  /* ── 코인 카운터 ── */
  #coin-display {
    background: rgba(255,255,255,0.22);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.38);
    box-shadow: 0 2px 10px rgba(0,0,0,.15);
    border-radius: 20px; padding: 5px 14px;
    font-size: .88rem; font-weight: 700; color: #fff;
    text-shadow: 0 1px 5px rgba(0,0,0,.5);
    display: flex; align-items: center; gap: 5px;
  }
  #coin-display img { width: 18px; height: 18px; object-fit: contain; }

  /* ── 카메라 ── */
  #cam-wrap {
    position: relative; width: 140px; height: 105px;
    border-radius: 12px; overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,.3);
    border: 1px solid rgba(255,255,255,.3);
    background: #222; flex-shrink: 0;
  }
  #cam-video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
  #cam-overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: #aaa; font-size: .72rem; text-align: center; padding: 8px;
    pointer-events: none;
  }

  /* ── 게임 영역 ── */
  #game-wrap {
    position: relative;
    width: fit-content; height: fit-content;
    perspective: 1100px; perspective-origin: 50% 50%;
    touch-action: none;
  }
  #maze-tilt-container {
    display: flex; align-items: center; justify-content: center;
    transform-style: preserve-3d; will-change: transform;
  }
  #maze-canvas {
    border-radius: 12px;
    box-shadow: 0 16px 48px rgba(0,0,0,.35), 0 0 0 1px rgba(255,255,255,.22);
    will-change: box-shadow;
  }

  /* ── 클리어 오버레이 ── */
  #clear-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; pointer-events: none; transition: background .6s;
  }
  #clear-overlay.show { background: rgba(0,0,0,.6); pointer-events: all; }
  #clear-card {
    background: rgba(255,255,255,0.14);
    backdrop-filter: blur(22px) saturate(180%);
    -webkit-backdrop-filter: blur(22px) saturate(180%);
    border: 1px solid rgba(255,255,255,0.4);
    border-radius: 28px; padding: 40px 52px;
    box-shadow: 0 24px 64px rgba(0,0,0,.4);
    text-align: center;
    transform: scale(.5) translateY(60px); opacity: 0;
    transition: transform .5s cubic-bezier(.34,1.56,.64,1), opacity .4s;
  }
  #clear-overlay.show #clear-card { transform: scale(1) translateY(0); opacity: 1; }
  #clear-img {
    width: 300px; max-width: 78vw;
    filter: drop-shadow(0 4px 24px rgba(0,0,0,.55));
    display: block; margin: 0 auto 18px;
  }
  #clear-card .collected {
    font-size: 1.15rem; font-weight: 700; color: #fff;
    text-shadow: 0 1px 8px rgba(0,0,0,.6);
    margin-bottom: 26px;
  }
  #restart-btn {
    background: rgba(255,255,255,0.24);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.5);
    border-radius: 14px;
    padding: 12px 36px; font-size: 1rem; font-weight: 700; color: #fff; cursor: pointer;
    box-shadow: 0 4px 16px rgba(0,0,0,.22);
    transition: background .15s, transform .15s;
  }
  #restart-btn:hover {
    background: rgba(255,255,255,0.38);
    transform: scale(.97);
  }

  /* ── 기타 ── */
  .hint {
    margin-top: 8px; font-size: .74rem;
    color: rgba(255,255,255,.78); letter-spacing: .04em;
    text-shadow: 0 1px 5px rgba(0,0,0,.5);
  }
  .key-hint {
    position: absolute; bottom: 6px; right: 8px;
    font-size: .68rem; color: rgba(255,255,255,.62);
    text-shadow: 0 1px 4px rgba(0,0,0,.5);
  }
</style>

<body>

<div class="title-wrap">
  <img id="title-img" src="assets/title.png" alt="Head Tilt Maze">
</div>

<div class="top-bar">
  <span id="timer-display">00:00</span>
  <div id="coin-display">
    <img src="assets/coin.png" alt="coin">
    <span>Coin: </span><span id="coin-count">0</span>
  </div>
  <div class="status-pill">
    <span class="dot" id="cam-dot"></span>
    <span id="cam-status">카메라 연결 중…</span>
  </div>
  <div id="cam-wrap">
    <video id="cam-video" autoplay muted playsinline></video>
    <div id="cam-overlay">카메라 권한 필요</div>
  </div>
</div>

<div id="game-wrap">
  <div id="maze-tilt-container">
    <canvas id="maze-canvas"></canvas>
  </div>
  <span class="key-hint">↑↓←→ 키보드 대체 가능</span>
</div>

<p class="hint">머리를 기울여 공을 굴려 탈출구(★)로 이동하세요</p>

<div id="clear-overlay">
  <div id="clear-card">
    <img id="clear-img" src="assets/gameclear.png" alt="Game Clear">
    <div class="collected" id="clear-collected-txt"></div>
    <button id="restart-btn" onclick="restartGame()">다시 도전</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm/vision_bundle.js" crossorigin="anonymous"></script>
<script type="module">
import { FaceLandmarker, FilesetResolver }
  from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/+esm";

// ════════════════════════════════════
//  미로 생성 (재귀 백트래킹)
// ════════════════════════════════════
const COLS = 11, ROWS = 18, CELL = 28, OX = 20, OY = 20;
let MAZE = [];

function sfc32(a,b,c,d){
  return function(){
    a|=0;b|=0;c|=0;d|=0;
    let t=(a+b|0)+d|0; d=d+1|0; a=b^b>>>9; b=c+(c<<3)|0;
    c=(c<<21|c>>>11)+t|0; return (t>>>0)/4294967296;
  };
}
function shuffle(arr,rand){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=0|rand()*(i+1);[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function generateMaze(cols,rows,seed){
  const rand=sfc32(seed,seed^0xdeadbeef,seed^0xcafe,1);
  const walls=Array.from({length:rows},()=>new Uint8Array(cols).fill(15));
  const vis  =Array.from({length:rows},()=>new Uint8Array(cols));
  function carve(cx,cy){
    vis[cy][cx]=1;
    for(const d of shuffle([0,1,2,3],rand)){
      const nx=cx+[0,1,0,-1][d], ny=cy+[-1,0,1,0][d];
      if(nx<0||nx>=cols||ny<0||ny>=rows||vis[ny][nx]) continue;
      walls[cy][cx]&=~[1,2,4,8][d]; walls[ny][nx]&=~[4,8,1,2][d];
      carve(nx,ny);
    }
  }
  carve(0,0); return walls;
}

// ════════════════════════════════════
//  코인 위치
// ════════════════════════════════════
const COIN_DEFS = [
  { cx:3,  cy:2  },
  { cx:9,  cy:4  },
  { cx:5,  cy:7  },
  { cx:9,  cy:9  },
  { cx:2,  cy:12 },
  { cx:8,  cy:14 },
  { cx:4,  cy:16 },
];

// ════════════════════════════════════
//  캔버스 설정
// ════════════════════════════════════
const canvas = document.getElementById('maze-canvas');
const ctx    = canvas.getContext('2d');
const mazeW  = COLS * CELL, mazeH = ROWS * CELL;
canvas.width  = mazeW + OX * 2;
canvas.height = mazeH + OY * 2;
const GOAL_COL = COLS - 1, GOAL_ROW = ROWS - 1;

// ── 이미지 에셋 ──
const bgImg        = new Image(); bgImg.src        = 'assets/background.jpeg';
const ballRightImg = new Image(); ballRightImg.src = 'assets/ball(right).png';
const ballLeftImg  = new Image(); ballLeftImg.src  = 'assets/ball(left).png';
const coinImg      = new Image(); coinImg.src      = 'assets/coin.png';
const starImg      = new Image(); starImg.src      = 'assets/star.png';
const pathTexImg   = new Image();
let   pathPattern  = null;
pathTexImg.onload  = () => { pathPattern = ctx.createPattern(pathTexImg, 'repeat'); };
pathTexImg.src     = 'assets/path.png';

// ════════════════════════════════════
//  게임 상태
// ════════════════════════════════════
let ball = { x:0, y:0, vx:0, vy:0, r:9 };
let rawTiltX = 0, rawTiltY = 0;
let tiltX = 0, tiltY = 0;
let pitchBaseline = null;
let startTime = null, elapsedMs = 0, cleared = false;
let coinCount = 0;
let collectedCoins = new Set();

function initGame(seed){
  MAZE = generateMaze(COLS, ROWS, seed || 42);
  ball = { x: OX + CELL*.5, y: OY + CELL*.5, vx:0, vy:0, r:9 };
  rawTiltX = rawTiltY = tiltX = tiltY = 0;
  pitchBaseline = null;
  startTime = null; elapsedMs = 0; cleared = false;
  coinCount = 0; collectedCoins.clear();
  document.getElementById('coin-count').textContent = '0';
  document.getElementById('clear-overlay').classList.remove('show');
}

// ════════════════════════════════════
//  그리기
// ════════════════════════════════════
function drawMaze(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // ── 캔버스 배경: background.jpeg (둥근 클립) ──
  ctx.save();
  ctx.beginPath(); ctx.roundRect(0,0,canvas.width,canvas.height,12); ctx.clip();
  if(bgImg.complete && bgImg.naturalWidth){
    ctx.drawImage(bgImg,0,0,canvas.width,canvas.height);
  } else {
    ctx.fillStyle='#c8b89a';
    ctx.fillRect(0,0,canvas.width,canvas.height);
  }
  // 미로판 프레임: 반투명 흰색 — 배경이 은은하게 비침
  ctx.fillStyle='rgba(255,255,255,0.52)';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.restore();

  // ── 미로 경로 텍스처 (path.png 반복 패턴) ──
  ctx.save();
  ctx.beginPath(); ctx.rect(OX,OY,mazeW,mazeH); ctx.clip();
  if(pathPattern){
    ctx.fillStyle=pathPattern;
    ctx.fillRect(OX,OY,mazeW,mazeH);
  } else {
    ctx.fillStyle='rgba(215,195,155,0.92)';
    ctx.fillRect(OX,OY,mazeW,mazeH);
  }
  ctx.restore();

  // ── 코인 ──
  const coinSize = CELL * 0.76;
  for(let i=0; i<COIN_DEFS.length; i++){
    if(collectedCoins.has(i)) continue;
    const c = COIN_DEFS[i];
    const px = OX + c.cx*CELL + CELL/2;
    const py = OY + c.cy*CELL + CELL/2;
    if(coinImg.complete && coinImg.naturalWidth){
      ctx.drawImage(coinImg, px-coinSize/2, py-coinSize/2, coinSize, coinSize);
    } else {
      ctx.beginPath(); ctx.arc(px,py,8,0,Math.PI*2);
      ctx.fillStyle='#f5c518'; ctx.fill();
    }
  }

  // ── 탈출구 (star.png 이미지) ──
  const gx=OX+GOAL_COL*CELL, gy=OY+GOAL_ROW*CELL;
  const gcx=gx+CELL/2, gcy=gy+CELL/2;
  // 발광 후광 (배경 대비 강조)
  const gg=ctx.createRadialGradient(gcx,gcy,2,gcx,gcy,CELL*.85);
  gg.addColorStop(0,'rgba(255,230,80,.55)'); gg.addColorStop(1,'rgba(255,200,40,0)');
  ctx.fillStyle=gg; ctx.fillRect(gx-CELL*.35,gy-CELL*.35,CELL*1.7,CELL*1.7);
  // star.png (CELL * 1.6 크기, 중앙 정렬)
  const starSize = CELL * 1.6;
  if(starImg.complete && starImg.naturalWidth){
    ctx.drawImage(starImg, gcx-starSize/2, gcy-starSize/2, starSize, starSize);
  } else {
    ctx.font=`bold ${CELL*.72}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='#f5c518'; ctx.fillText('★',gcx,gcy);
  }

  // ── 벽 (배경과 어우러지는 따뜻한 갈색) ──
  ctx.strokeStyle='rgba(80,48,16,0.72)'; ctx.lineWidth=2.5; ctx.lineCap='square';
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const x=OX+c*CELL, y=OY+r*CELL, w=MAZE[r][c];
      ctx.beginPath();
      if(w&1){ctx.moveTo(x,y);      ctx.lineTo(x+CELL,y);}
      if(w&2){ctx.moveTo(x+CELL,y); ctx.lineTo(x+CELL,y+CELL);}
      if(w&4){ctx.moveTo(x,y+CELL); ctx.lineTo(x+CELL,y+CELL);}
      if(w&8){ctx.moveTo(x,y);      ctx.lineTo(x,y+CELL);}
      ctx.stroke();
    }
  }

  // ── 외곽 테두리 (반투명 흰색) ──
  ctx.strokeStyle='rgba(255,255,255,0.55)'; ctx.lineWidth=4;
  ctx.strokeRect(OX,OY,mazeW,mazeH);

  // ── 입구/출구 개방 ──
  ctx.clearRect(OX+2,OY-3,CELL-4,6);
  ctx.clearRect(OX+GOAL_COL*CELL+2,OY+mazeH-1,CELL-4,6);

  // ── 공 (기울기 방향에 따라 이미지 전환, 200% 스케일) ──
  const ballImg = tiltX < -1.5 ? ballLeftImg : ballRightImg;
  const ballSize = ball.r * 4;
  if(ballImg.complete && ballImg.naturalWidth){
    ctx.save();
    ctx.drawImage(ballImg, ball.x-ballSize/2, ball.y-ballSize/2, ballSize, ballSize);
    ctx.restore();
  } else {
    const bg2=ctx.createRadialGradient(
      ball.x-ball.r*.3,ball.y-ball.r*.3,ball.r*.1,
      ball.x,ball.y,ball.r
    );
    bg2.addColorStop(0,'#ff8a80'); bg2.addColorStop(.4,'#e53935'); bg2.addColorStop(1,'#7f0000');
    ctx.beginPath(); ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);
    ctx.fillStyle=bg2; ctx.fill();
    ctx.beginPath(); ctx.arc(ball.x-ball.r*.28,ball.y-ball.r*.28,ball.r*.28,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,.5)'; ctx.fill();
  }
}

// ════════════════════════════════════
//  물리
// ════════════════════════════════════
const GRAVITY      = 12;
const FRICTION     = 0.88;
const BOUNCE       = 0.65;
const MAX_SPEED    = 50;
const BASE_GRAVITY = 0.15;

function getWallRects(){
  const rects=[], W=3;
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const x=OX+c*CELL, y=OY+r*CELL, w=MAZE[r][c];
    if(w&1) rects.push({x1:x-W,y1:y-W,x2:x+CELL+W,y2:y+W});
    if(w&2) rects.push({x1:x+CELL-W,y1:y-W,x2:x+CELL+W,y2:y+CELL+W});
    if(w&4) rects.push({x1:x-W,y1:y+CELL-W,x2:x+CELL+W,y2:y+CELL+W});
    if(w&8) rects.push({x1:x-W,y1:y-W,x2:x+W,y2:y+CELL+W});
  }
  return rects;
}

function resolveWall({x1,y1,x2,y2}){
  const r=ball.r, cx=ball.x, cy=ball.y;
  if(cx+r<x1||cx-r>x2||cy+r<y1||cy-r>y2) return;
  const oL=cx+r-x1, oR=x2-(cx-r), oT=cy+r-y1, oB=y2-(cy-r);
  const m=Math.min(oL,oR,oT,oB);
  if(m===oL){ball.x-=oL; ball.vx*=-BOUNCE;}
  else if(m===oR){ball.x+=oR; ball.vx*=-BOUNCE;}
  else if(m===oT){ball.y-=oT; ball.vy*=-BOUNCE;}
  else           {ball.y+=oB; ball.vy*=-BOUNCE;}
}

function physicsStep(){
  if(cleared) return;

  ball.vx += Math.sin(tiltX * Math.PI/180) * GRAVITY;
  ball.vy += Math.sin(tiltY * Math.PI/180) * GRAVITY + BASE_GRAVITY;
  ball.vx *= FRICTION;
  ball.vy *= FRICTION;

  const spd=Math.hypot(ball.vx,ball.vy);
  if(spd>MAX_SPEED){ball.vx=ball.vx/spd*MAX_SPEED; ball.vy=ball.vy/spd*MAX_SPEED;}

  ball.x+=ball.vx; ball.y+=ball.vy;

  const mg=ball.r+2;
  if(ball.x<OX+mg)       {ball.x=OX+mg;       ball.vx*=-BOUNCE;}
  if(ball.x>OX+mazeW-mg) {ball.x=OX+mazeW-mg; ball.vx*=-BOUNCE;}
  if(ball.y<OY+mg)       {ball.y=OY+mg;       ball.vy*=-BOUNCE;}
  if(ball.y>OY+mazeH-mg) {ball.y=OY+mazeH-mg; ball.vy*=-BOUNCE;}

  for(const w of getWallRects()) resolveWall(w);

  // ── 코인 수집 (팝업 없음) ──
  for(let i=0; i<COIN_DEFS.length; i++){
    if(collectedCoins.has(i)) continue;
    const c=COIN_DEFS[i];
    const px=OX+c.cx*CELL+CELL/2, py=OY+c.cy*CELL+CELL/2;
    const dx=ball.x-px, dy=ball.y-py;
    if(dx*dx+dy*dy < (ball.r+10)**2){
      collectedCoins.add(i);
      coinCount++;
      document.getElementById('coin-count').textContent = coinCount;
    }
  }

  // ── 탈출 체크 ──
  const gx=OX+GOAL_COL*CELL+CELL/2, gy=OY+GOAL_ROW*CELL+CELL/2;
  if((ball.x-gx)**2+(ball.y-gy)**2 < (ball.r+10)**2) triggerClear();
}

// ════════════════════════════════════
//  CSS 3D 기울기 + 그림자 동기화
// ════════════════════════════════════
const tiltContainer = document.getElementById('maze-tilt-container');

function applyTiltCSS(){
  // tiltX > 0 (머리 오른쪽) → rotateY(+) → 오른쪽이 앞/아래 ✓
  // Pitch: tiltY < 0 (얼굴 위로) → 윗면이 뒤로 → rotateX(+) 필요 → 부호 반전
  //        tiltY > 0 (얼굴 아래) → 아랫면이 뒤로 → rotateX(-) 필요 → 부호 반전
  const ry = tiltX * 1.8;
  const rx = -tiltY * 1.8;   // ← 시각적 Pitch 방향 교정 (물리 로직은 그대로)
  tiltContainer.style.transform = `rotateX(${rx}deg) rotateY(${ry}deg)`;

  const sx = tiltX * 1.4, sy = -tiltY * 1.4;  // 그림자도 동일하게 반전
  canvas.style.boxShadow =
    `${10+sx}px ${10+sy}px 48px rgba(0,0,0,.38),
     0 0 0 1px rgba(255,255,255,.22)`;
}

// ════════════════════════════════════
//  게임 클리어
// ════════════════════════════════════
function triggerClear(){
  if(cleared) return; cleared=true;
  document.getElementById('clear-collected-txt').textContent =
    `습득한 총 코인 개수: ${coinCount}개`;
  setTimeout(()=>document.getElementById('clear-overlay').classList.add('show'),120);
}

window.restartGame=function(){ initGame(Math.floor(Math.random()*99999)); };

// ════════════════════════════════════
//  헬퍼: deadzone + lerp
// ════════════════════════════════════
function deadzone(v, dz){ return Math.abs(v)<dz ? 0 : v; }
function lerp(a, b, t){ return a + (b-a)*t; }

// ════════════════════════════════════
//  메인 루프
// ════════════════════════════════════
const SMOOTH = 0.10;
const DZ     = 1.8;

let lastRaf = 0;
function loop(ts){
  const dt = ts - lastRaf; lastRaf = ts;

  tiltX = lerp(tiltX, deadzone(rawTiltX, DZ), SMOOTH);
  tiltY = lerp(tiltY, deadzone(rawTiltY, DZ), SMOOTH);

  if(!cleared){
    if(!startTime) startTime = ts;
    elapsedMs = ts - startTime;
    const m=Math.floor(elapsedMs/60000).toString().padStart(2,'0');
    const s=Math.floor((elapsedMs%60000)/1000).toString().padStart(2,'0');
    document.getElementById('timer-display').textContent=`${m}:${s}`;
  }

  applyTiltCSS();
  physicsStep();
  drawMaze();
  requestAnimationFrame(loop);
}

// ════════════════════════════════════
//  키보드 (raw 값에 직접 쓰기)
// ════════════════════════════════════
const keys={};
window.addEventListener('keydown',e=>{keys[e.key]=true; e.preventDefault();});
window.addEventListener('keyup',  e=>{keys[e.key]=false;});
function applyKeys(){
  const STEP=28;
  if(keys['ArrowLeft'])  rawTiltX=Math.max(rawTiltX-3,-STEP);
  if(keys['ArrowRight']) rawTiltX=Math.min(rawTiltX+3, STEP);
  if(keys['ArrowUp'])    rawTiltY=Math.max(rawTiltY-3,-STEP);
  if(keys['ArrowDown'])  rawTiltY=Math.min(rawTiltY+3, STEP);
  if(!keys['ArrowLeft'] &&!keys['ArrowRight']) rawTiltX*=.82;
  if(!keys['ArrowUp']   &&!keys['ArrowDown'])  rawTiltY*=.82;
}
setInterval(applyKeys,16);

// ════════════════════════════════════
//  MediaPipe 헤드 트래킹
// ════════════════════════════════════
async function initFace(){
  const dot=document.getElementById('cam-dot');
  const statusEl=document.getElementById('cam-status');
  const camOverlay=document.getElementById('cam-overlay');

  let stream;
  try{
    stream=await navigator.mediaDevices.getUserMedia({
      video:{ width:320, height:240, facingMode:'user' }
    });
    const vid=document.getElementById('cam-video');
    vid.srcObject=stream;
    await new Promise(r=>vid.onloadedmetadata=r);
    vid.play(); camOverlay.style.display='none';
    statusEl.textContent='모델 로드 중…';
  }catch(e){
    statusEl.textContent='카메라 없음 (키보드 사용)';
    dot.style.background='#f44336'; return;
  }

  let landmarker;
  try{
    const vision=await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
    );
    landmarker=await FaceLandmarker.createFromOptions(vision,{
      baseOptions:{
        modelAssetPath:"https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
        delegate:"GPU"
      },
      runningMode:"VIDEO", numFaces:1,
      outputFaceBlendshapes:false,
      outputFacialTransformationMatrixes:true,
    });
    statusEl.textContent='추적 중'; dot.classList.add('active');
  }catch(e){
    statusEl.textContent='모델 로드 실패 (키보드 사용)';
    dot.style.background='#ff9800'; return;
  }

  const vid=document.getElementById('cam-video');
  let lastMs=-1;
  const MAX_ANGLE=28;

  function detectLoop(){
    const nowMs=performance.now();
    if(nowMs-lastMs > 16){
      lastMs=nowMs;
      const result=landmarker.detectForVideo(vid,nowMs);
      const lms=result.faceLandmarks?.[0];
      if(lms){
        const lEye = lms[33], rEye = lms[263];
        const rollRad = Math.atan2(rEye.y - lEye.y, rEye.x - lEye.x);
        const rollDeg = rollRad * 180 / Math.PI;
        rawTiltX = Math.max(-MAX_ANGLE, Math.min(MAX_ANGLE, -rollDeg * 1.6));

        const nose = lms[4];
        const eyeCY = (lEye.y + rEye.y) / 2;
        const faceW = Math.abs(rEye.x - lEye.x) || 0.001;
        const noseRelY = (nose.y - eyeCY) / faceW;

        if(pitchBaseline === null) pitchBaseline = noseRelY;
        else pitchBaseline = pitchBaseline * 0.997 + noseRelY * 0.003;

        const pitchDev = (noseRelY - pitchBaseline) * 80;
        rawTiltY = Math.max(-MAX_ANGLE, Math.min(MAX_ANGLE, pitchDev));
      }
    }
    requestAnimationFrame(detectLoop);
  }
  detectLoop();
}

// ════════════════════════════════════
//  시작
// ════════════════════════════════════
initGame(42);
requestAnimationFrame(loop);
initFace();
</script>
